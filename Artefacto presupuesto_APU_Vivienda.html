<script type="text/babel">
const{useState,useMemo,useCallback}=React;

const fmt=n=>{const v=Math.round(n||0);return v.toString().replace(/\B(?=(\d{3})+(?!\d))/g,",")};
const fmt2=n=>new Intl.NumberFormat("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);

function App(){
const[apus,setApus]=useState(D.apus);
const[mc,setMc]=useState(D.mc);
const[lc,setLc]=useState(D.lc);
const[ec,setEc]=useState(D.ec);
const[aiu,setAiu]=useState(D.aiu);
const[view,setView]=useState("resumen");
const[selId,setSelId]=useState(null);
const[search,setSearch]=useState("");
const[catTab,setCatTab]=useState(0);
const[showAIU,setShowAIU]=useState(false);
const[modal,setModal]=useState(null);
const[newForm,setNewForm]=useState({desc:"",unit:"m²",mat:[],mo:[],eq:[]});
const[addForm,setAddForm]=useState({type:"mat",cid:"",qty:"",h:""});
const[newMat,setNewMat]=useState({d:"",u:"",p:""});
const[newMo,setNewMo]=useState({d:"",j:""});
const[newEq,setNewEq]=useState({d:"",u:"",t:""});
const[catSearch,setCatSearch]=useState("");

const getMat=useCallback(id=>mc.find(m=>m.id===id),[mc]);
const getMo=useCallback(id=>lc.find(m=>m.id===id),[lc]);
const getEq=useCallback(id=>ec.find(e=>e.id===id),[ec]);

const calcAPU=useCallback((apu)=>{
  const ms=apu.mat.reduce((s,m)=>{const c=getMat(m.cid);return s+(c?c.p*m.q:0)},0);
  const ls=apu.mo.reduce((s,m)=>{const c=getMo(m.cid);return s+(c?c.vh*m.h:0)},0);
  const es=apu.eq.reduce((s,e)=>{const c=getEq(e.cid);if(!c)return s;return s+(c.u==="%MO"?c.t*e.q*ls:c.t*e.q)},0);
  return{ms,ls,es,cd:ms+ls+es};
},[getMat,getMo,getEq]);

const resumen=useMemo(()=>{
  let cd=0;
  const rows=apus.map(a=>{const c=calcAPU(a);const t=c.cd*a.qty;cd+=t;return{...a,...c,total:t}});
  const admin=cd*aiu.admin/100;const imp=cd*aiu.imp/100;const util=cd*aiu.util/100;
  const aiuT=admin+imp+util;const ivaV=util*aiu.iva/100;
  return{rows,cd,admin,imp,util,aiuT,ivaV,gt:cd+aiuT+ivaV};
},[apus,calcAPU,aiu]);

const filtered=useMemo(()=>{
  if(!search)return resumen.rows;
  const s=search.toLowerCase();
  return resumen.rows.filter(r=>r.desc.toLowerCase().includes(s)||String(r.id).includes(s));
},[resumen.rows,search]);

const selAPU=useMemo(()=>selId?apus.find(a=>a.id===selId):null,[apus,selId]);
const selCalc=useMemo(()=>selAPU?calcAPU(selAPU):null,[selAPU,calcAPU]);

const updateQty=(id,v)=>setApus(p=>p.map(a=>a.id===id?{...a,qty:Math.max(0,parseFloat(v)||0)}:a));
const openAPU=id=>{setSelId(id);setView("detalle")};

const updateInsumoField=(apuId,sec,idx,field,val)=>{
  setApus(p=>p.map(a=>{
    if(a.id!==apuId)return a;
    const u={...a};u[sec]=[...a[sec]];u[sec][idx]={...u[sec][idx],[field]:parseFloat(val)||0};return u;
  }));
};

const removeInsumo=(apuId,sec,idx)=>setApus(p=>p.map(a=>a.id!==apuId?a:{...a,[sec]:a[sec].filter((_,i)=>i!==idx)}));

const addInsumoToAPU=(apuId)=>{
  const{type,cid,qty,h}=addForm;if(!cid)return;const cidN=parseInt(cid);
  setApus(p=>p.map(a=>{
    if(a.id!==apuId)return a;const u={...a};
    if(type==="mat")u.mat=[...a.mat,{cid:cidN,q:parseFloat(qty)||0}];
    else if(type==="mo")u.mo=[...a.mo,{cid:cidN,h:parseFloat(h)||0}];
    else u.eq=[...a.eq,{cid:cidN,q:parseFloat(qty)||0}];
    return u;
  }));
  setAddForm({type:"mat",cid:"",qty:"",h:""});setModal(null);
};

const updateCatPrice=(type,id,field,val)=>{
  const v=parseFloat(val)||0;
  if(type==="mat")setMc(p=>p.map(m=>m.id===id?{...m,[field]:v}:m));
  else if(type==="mo"){if(field==="j")setLc(p=>p.map(m=>m.id===id?{...m,j:v,vh:v/8}:m));else setLc(p=>p.map(m=>m.id===id?{...m,[field]:v}:m));}
  else setEc(p=>p.map(e=>e.id===id?{...e,[field]:v}:e));
};

const addNewMaterial=()=>{if(!newMat.d)return;setMc(p=>[...p,{id:Math.max(0,...p.map(m=>m.id))+1,d:newMat.d,u:newMat.u,p:parseFloat(newMat.p)||0}]);setNewMat({d:"",u:"",p:""});};
const addNewLabor=()=>{if(!newMo.d)return;const j=parseFloat(newMo.j)||0;setLc(p=>[...p,{id:Math.max(0,...p.map(m=>m.id))+1,d:newMo.d,j,vh:j/8}]);setNewMo({d:"",j:""});};
const addNewEquip=()=>{if(!newEq.d)return;setEc(p=>[...p,{id:Math.max(0,...p.map(e=>e.id))+1,d:newEq.d,u:newEq.u,t:parseFloat(newEq.t)||0}]);setNewEq({d:"",u:"",t:""});};

const createAPU=()=>{
  if(!newForm.desc)return;
  const nid=Math.max(0,...apus.map(a=>a.id))+1;
  setApus(p=>[...p,{id:nid,desc:newForm.desc,unit:newForm.unit,qty:1,mat:[...newForm.mat],mo:[...newForm.mo],eq:[...newForm.eq]}]);
  setNewForm({desc:"",unit:"m²",mat:[],mo:[],eq:[]});setView("resumen");
};
const addToNewAPU=(type)=>{
  const{cid,qty,h}=addForm;if(!cid)return;const cidN=parseInt(cid);
  setNewForm(p=>{const u={...p};
    if(type==="mat"){const cat=mc.find(c=>c.id===cidN);if(cat)u.mat=[...p.mat,{cid:cidN,q:parseFloat(qty)||0}];}
    else if(type==="mo"){const cat=lc.find(c=>c.id===cidN);if(cat)u.mo=[...p.mo,{cid:cidN,h:parseFloat(h)||0}];}
    else{const cat=ec.find(c=>c.id===cidN);if(cat)u.eq=[...p.eq,{cid:cidN,q:parseFloat(qty)||0}];}
    return u;
  });
  setAddForm({type:"mat",cid:"",qty:"",h:""});
};
const removeNewAPU=(sec,idx)=>setNewForm(p=>({...p,[sec]:p[sec].filter((_,i)=>i!==idx)}));
const deleteAPU=(id)=>{setApus(p=>p.filter(a=>a.id!==id));if(selId===id){setSelId(null);setView("resumen")}};

// ═══════ EXCEL EXPORT ═══════
const downloadAPUExcel=(apuId)=>{
  const apu=apus.find(a=>a.id===apuId);
  if(!apu)return;
  const padId=String(apu.id).padStart(2,'0');
  const rows=[];const merges=[];
  const psh=(arr)=>{rows.push(arr);return rows.length};
  const mg=(r,c1,c2)=>merges.push({s:{r,c:c1},e:{r,c:c2}});
  let r;

  r=psh(["ANÁLISIS DE PRECIOS UNITARIOS (APU)","","","","",""])-1;mg(r,0,5);
  r=psh(["Proyecto: Vivienda Unifamiliar 2 Niveles — 300 m² — Zona Rural México","","","","",""])-1;mg(r,0,5);
  psh([]);
  psh(["Ítem:",apu.id,"","Unidad:",apu.unit,""]);
  psh(["Fecha:",new Date().toLocaleDateString("es-MX"),"","","",""]);
  r=psh([apu.desc,"","","","",""])-1;mg(r,0,5);
  psh([]);

  // 1. MATERIALES
  r=psh(["1. MATERIALES","","","","",""])-1;mg(r,0,5);
  psh(["Nº","Descripción","Unidad","Precio Unit. (MXN)","Cantidad","Subtotal (MXN)"]);
  const matStart=rows.length;
  apu.mat.forEach((m,i)=>{const cat=getMat(m.cid);if(cat)psh([i+1,cat.d,cat.u,cat.p,m.q,null]);});
  const matEnd=rows.length;
  const matSubRow=psh(["","","","","SUBTOTAL MATERIALES:",null]);
  psh([]);

  // 2. MANO DE OBRA
  r=psh(["2. MANO DE OBRA","","","","",""])-1;mg(r,0,5);
  psh(["Nº","Descripción","Jornal/día (MXN)","Valor hora (MXN)","Horas/Und","Subtotal (MXN)"]);
  const moStart=rows.length;
  apu.mo.forEach((m,i)=>{const cat=getMo(m.cid);if(cat)psh([i+1,cat.d,cat.j,cat.vh,m.h,null]);});
  const moEnd=rows.length;
  const moSubRow=psh(["","","","","SUBTOTAL MANO DE OBRA:",null]);
  psh([]);

  // 3. EQUIPOS
  r=psh(["3. EQUIPOS Y HERRAMIENTA","","","","",""])-1;mg(r,0,5);
  psh(["Nº","Descripción","Unidad","Tarifa (MXN)","Cantidad","Subtotal (MXN)"]);
  const eqStart=rows.length;
  const eqIsPercent=[];
  apu.eq.forEach((e,i)=>{const cat=getEq(e.cid);if(cat){eqIsPercent.push(cat.u==="%MO");psh([i+1,cat.d,cat.u,cat.t,e.q,null]);}});
  const eqEnd=rows.length;
  const eqSubRow=psh(["","","","","SUBTOTAL EQUIPOS:",null]);
  psh([]);psh([]);

  const cdRow=psh(["","","","COSTO DIRECTO TOTAL POR "+apu.unit+":",null,null]);
  psh([]);
  psh(["","","","","Desglose:",""]);
  const desMatRow=psh(["","","","","  Materiales:",null]);
  const desMoRow=psh(["","","","","  Mano de Obra:",null]);
  const desEqRow=psh(["","","","","  Equipos:",null]);
  psh([]);
  r=psh(["Los valores de Precio (col D) y Cantidad/Horas (col E) son editables. Las fórmulas recalculan automáticamente.","","","","",""])-1;mg(r,0,5);

  // Build worksheet
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!merges']=merges;
  ws['!cols']=[{wch:5},{wch:48},{wch:14},{wch:18},{wch:22},{wch:20}];

  // ── FORMULAS ──
  // Material rows: F=D*E
  for(let i=matStart;i<matEnd;i++){const rn=i+1;ws['F'+rn]={t:'n',f:'D'+rn+'*E'+rn};}
  // Material subtotal
  if(matEnd>matStart)ws['F'+matSubRow]={t:'n',f:'SUM(F'+(matStart+1)+':F'+matEnd+')'};
  else ws['F'+matSubRow]={t:'n',v:0};

  // MO rows: F=D*E
  for(let i=moStart;i<moEnd;i++){const rn=i+1;ws['F'+rn]={t:'n',f:'D'+rn+'*E'+rn};}
  if(moEnd>moStart)ws['F'+moSubRow]={t:'n',f:'SUM(F'+(moStart+1)+':F'+moEnd+')'};
  else ws['F'+moSubRow]={t:'n',v:0};

  // EQ rows: F=D*E or F=D*E*MoSubtotal
  let eqIdx=0;
  for(let i=eqStart;i<eqEnd;i++){
    const rn=i+1;
    if(eqIsPercent[eqIdx])ws['F'+rn]={t:'n',f:'D'+rn+'*E'+rn+'*F'+moSubRow};
    else ws['F'+rn]={t:'n',f:'D'+rn+'*E'+rn};
    eqIdx++;
  }
  if(eqEnd>eqStart)ws['F'+eqSubRow]={t:'n',f:'SUM(F'+(eqStart+1)+':F'+eqEnd+')'};
  else ws['F'+eqSubRow]={t:'n',v:0};

  // Costo Directo = sum of 3 subtotals
  ws['E'+cdRow]={t:'n',f:'F'+matSubRow+'+F'+moSubRow+'+F'+eqSubRow};
  ws['F'+cdRow]={t:'n',f:'F'+matSubRow+'+F'+moSubRow+'+F'+eqSubRow};

  // Desglose
  ws['F'+desMatRow]={t:'n',f:'F'+matSubRow};
  ws['F'+desMoRow]={t:'n',f:'F'+moSubRow};
  ws['F'+desEqRow]={t:'n',f:'F'+eqSubRow};

  // Download
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'APU-'+padId);
  XLSX.writeFile(wb,'APU-'+padId+'_'+apu.desc.substring(0,35).replace(/[^a-zA-Z0-9 ]/g,'').trim().replace(/ +/g,'_')+'.xlsx');
};

// ═══════ NUEVO APU ═══════
const ViewNewAPU=()=>{
  const matS=newForm.mat.reduce((s,m)=>{const c=getMat(m.cid);return s+(c?c.p*m.q:0)},0);
  const moS=newForm.mo.reduce((s,m)=>{const c=getMo(m.cid);return s+(c?c.vh*m.h:0)},0);
  const eqS=newForm.eq.reduce((s,e)=>{const c=getEq(e.cid);if(!c)return s;return s+(c.u==="%MO"?c.t*e.q*moS:c.t*e.q)},0);

  const SecBlock=({title,sec,type,items})=>(
    <div style={{marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{...S.cTitle,fontSize:11}}>{title}</span>
        <button style={S.btnS} onClick={()=>setModal({type:"addNew",sec:type})}>+ Agregar</button>
      </div>
      {items.length>0&&<table style={{...S.tbl,marginBottom:8}}><tbody>{items.map((it,i)=>{
        let cat,sub;
        if(type==="mat"){cat=getMat(it.cid);sub=cat?cat.p*it.q:0}
        else if(type==="mo"){cat=getMo(it.cid);sub=cat?cat.vh*it.h:0}
        else{cat=getEq(it.cid);sub=cat?(cat.u==="%MO"?cat.t*it.q*moS:cat.t*it.q):0}
        return cat?<tr key={i}><td style={S.td}>{cat.d}</td><td style={{...S.tdR,width:100}}>$ {fmt(sub)}</td><td style={{...S.td,width:32}}><button style={S.btnD} onClick={()=>removeNewAPU(sec,i)}>✕</button></td></tr>:null;
      })}</tbody></table>}
      {items.length===0&&<div style={{fontSize:11,color:"var(--txt3)",padding:"8px 0"}}>Sin insumos.</div>}
    </div>
  );

  return(
    <React.Fragment>
      <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>Crear Nuevo APU</div>
      <div style={S.card}><div style={{padding:16}}>
        <div style={S.row}>
          <div style={S.fld(4)}><label style={S.lbl}>Descripción</label><input style={S.inp} value={newForm.desc} onChange={e=>setNewForm({...newForm,desc:e.target.value})} placeholder="SUMINISTRO E INSTALACIÓN DE..."/></div>
          <div style={S.fld()}><label style={S.lbl}>Unidad</label><input style={S.inp} value={newForm.unit} onChange={e=>setNewForm({...newForm,unit:e.target.value})}/></div>
        </div>
        <div style={S.divider}/>
        <SecBlock title="1 · Materiales" sec="mat" type="mat" items={newForm.mat}/>
        <SecBlock title="2 · Mano de Obra" sec="mo" type="mo" items={newForm.mo}/>
        <SecBlock title="3 · Equipos" sec="eq" type="eq" items={newForm.eq}/>
        <div style={{...S.tot,marginTop:16}}>
          <div style={S.totI}><div style={S.totL}>Mat</div><div style={S.totV()}>$ {fmt(matS)}</div></div>
          <div style={S.totI}><div style={S.totL}>M.O.</div><div style={S.totV()}>$ {fmt(moS)}</div></div>
          <div style={S.totI}><div style={S.totL}>Eq</div><div style={S.totV()}>$ {fmt(eqS)}</div></div>
          <div style={{...S.totI,borderLeft:"3px solid var(--acc)"}}><div style={{...S.totL,color:"var(--acc)"}}>C.D.</div><div style={S.totV(true)}>$ {fmt(matS+moS+eqS)}</div></div>
        </div>
        <div style={{marginTop:16}}><button style={S.btn} onClick={createAPU}>Crear APU #{Math.max(0,...apus.map(a=>a.id))+1}</button></div>
      </div></div>
    </React.Fragment>
  );
};

    </div>
    <div style={S.main}>
      {view==="resumen"&&<ViewResumen/>}
      {view==="detalle"&&<ViewDetalle/>}
      {view==="catalogs"&&<ViewCatalogs/>}
      {view==="nuevo"&&<ViewNewAPU/>}
    </div>

    {modal&&modal.type==="addInsumo"&&<ModalInsumo onAdd={()=>addInsumoToAPU(modal.apuId)} title="Agregar Insumo al APU"/>}
    {modal&&modal.type==="addNew"&&(
      <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)setModal(null)}}>
        <div style={S.modalC}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <span style={{...S.cTitle,fontSize:13}}>Agregar al Nuevo APU</span>
            <button style={S.btnS} onClick={()=>setModal(null)}>Cerrar</button>
          </div>
          <div style={S.row}><div style={S.fld(3)}>
            <label style={S.lbl}>Catálogo</label>
            <select style={S.sel} value={addForm.cid} onChange={e=>setAddForm({...addForm,type:modal.sec,cid:e.target.value})}>
              <option value="">— Seleccionar —</option>
              {modal.sec==="mat"&&mc.map(c=><option key={c.id} value={c.id}>{c.d} ({c.u}) — ${fmt(c.p)}</option>)}
              {modal.sec==="mo"&&lc.map(c=><option key={c.id} value={c.id}>{c.d} — ${fmt(c.vh)}/hr</option>)}
              {modal.sec==="eq"&&ec.map(c=><option key={c.id} value={c.id}>{c.d} ({c.u}) — ${fmt(c.t)}</option>)}
            </select>
          </div>
          <div style={S.fld(.8)}>
            <label style={S.lbl}>{modal.sec==="mo"?"Horas":"Cantidad"}</label>
            <input style={S.inp} type="number" step="any" value={modal.sec==="mo"?addForm.h:addForm.qty} onChange={e=>{
              if(modal.sec==="mo")setAddForm({...addForm,h:e.target.value});else setAddForm({...addForm,qty:e.target.value});
            }}/>
          </div></div>
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <button style={S.btn} onClick={()=>{addToNewAPU(modal.sec);setModal(null)}}>Agregar</button>
            <button style={S.btnS} onClick={()=>setModal(null)}>Cancelar</button>
          </div>
        </div>
      </div>
    )}

    <div style={S.foot}>
      <span>Sistema APU · {mc.length} materiales · {lc.length} M.O. · {ec.length} equipos</span>
      <span style={{fontVariantNumeric:"tabular-nums"}}>Total: <span style={{color:"var(--accL)",fontWeight:700}}>$ {fmt(resumen.gt)} MXN</span></span>
    </div>
  </div>
);
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
